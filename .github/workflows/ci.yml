name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
      branches: [ "main", "dev" ]

permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------
  # 1. Build + test on every push and every PR
  # ---------------------------------------------------------------------
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        # Tests run against the in-memory H2 DB and spring.cache.type=simple,
        # so no Postgres/Redis service containers are needed here.
        # WEATHER_API_KEY just needs to be non-empty; tests mock the HTTP client.
        env:
          WEATHER_API_KEY: dummy-ci-key
        run: ./mvnw -B test

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Build jar
        env:
          WEATHER_API_KEY: dummy-ci-key
        run: ./mvnw -B package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar