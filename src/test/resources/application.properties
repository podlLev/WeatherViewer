spring.datasource.url=jdbc:h2:mem:weather_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

spring.liquibase.change-log=classpath:liquibase/changelog.xml
spring.liquibase.enabled=true
spring.main.allow-bean-definition-overriding=true

weather.base.api.url=https://api.openweathermap.org
weather.api.url.suffix=/data/2.5/weather
forecast.api.url.suffix=/data/2.5/forecast
geo.api.url.suffix=/geo/1.0/direct
weather.api.key=${WEATHER_API_KEY}

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=simple
