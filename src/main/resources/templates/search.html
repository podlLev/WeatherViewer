<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: commonHead('Weather Viewer - Search')}"></head>

<th:block th:fragment="headContent">
    <link rel="stylesheet" th:href="@{/css/alerts.css}">
</th:block>

<th:block th:fragment="bodyContent">
    <div th:replace="~{header-component}"></div>
    <div class="container">
        <h2>Search results</h2>
        <div class="row row-cols-3 mt-3">
            <div class="col mb-3" th:each="location : ${foundLocations}">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${location.name}">Name</h5>
                        <p class="card-text">
                            <span th:if="${location.country != null} and ${location.state != null}"
                                  th:text="${location.country} + ', ' + ${location.state}">Country, State</span>

                            <span th:if="${location.country != null} and ${location.state == null}"
                                  th:text="${location.country}">Country</span>

                            <span th:if="${location.country == null} and ${location.state != null}"
                                  th:text="${location.state}">State</span>

                            <span th:if="${location.country == null} and ${location.state == null}">No data</span>
                        </p>
                        <form th:action="@{/search/add}" method="post">
                            <input type="hidden" th:name="name" th:value="${location.name}">
                            <input type="hidden" th:name="latitude" th:value="${location.latitude}">
                            <input type="hidden" th:name="longitude" th:value="${location.longitude}">
                            <button class="btn btn-primary" type="submit">Add to tracked locations</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="extraScripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    <script th:src="@{/js/alerts.js}"></script>
</th:block>

</html>
