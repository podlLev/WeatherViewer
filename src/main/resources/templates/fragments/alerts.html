<div th:fragment="alertToasts(successMessage, errorMessage, errorMessages)">
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050;">
        <div class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="5000"
             th:id="'successToast'"
             th:if="${successMessage != null}">
            <div class="toast-header bg-success text-white">
                <strong class="me-auto">Success</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" th:text="${successMessage}">Success message</div>
        </div>

        <div class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="5000"
             th:id="'errorToast'"
             th:if="${errorMessage != null}">
            <div class="toast-header bg-danger text-white">
                <strong class="me-auto">Error</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" th:text="${errorMessage}">Error message</div>
        </div>

        <div class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="7000"
             th:id="'errorsToast'"
             th:if="${errorMessages != null}">
            <div class="toast-header bg-danger text-white">
                <strong class="me-auto">Errors</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
                <ul>
                    <li th:each="err : ${errorMessages}" th:text="${err}">Error detail</li>
                </ul>
            </div>
        </div>
    </div>
</div>
