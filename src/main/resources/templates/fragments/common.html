<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="commonHead(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Weather Viewer</title>

    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">

    <script th:src="@{/js/theme-init.js}"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/theme.css}">

    <th:block th:replace="~{this :: headContent}"></th:block>
</head>

<body class="bg-body text-body">
    <div th:replace="~{this :: bodyContent}"></div>
    <th:block th:replace="~{this :: extraScripts}"></th:block>
</body>

</html>
