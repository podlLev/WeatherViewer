<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: commonHead('Weather Viewer')}"></head>

<th:block th:fragment="headContent">
    <link href="https://use.fontawesome.com/releases/v5.12.0/css/all.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/ionicons/2.0.1/css/ionicons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/alerts.css}">
</th:block>

<th:block th:fragment="bodyContent">
    <div th:replace="~{header-component}"></div>
    <div class="container min-vh-100">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0">Current Weather</h2>

            <form method="get" th:action="@{/}" class="d-flex align-items-center">
                <label for="sortSelect" class="me-2 fw-bold">Sort by:</label>
                <select id="sortSelect" name="sort" class="form-select form-select-sm w-auto">
                    <option value="date" th:selected="${sort == 'date'}">Date</option>
                    <option value="nameAsc" th:selected="${sort == 'nameAsc'}">Name ↑</option>
                    <option value="nameDesc" th:selected="${sort == 'nameDesc'}">Name ↓</option>
                    <option value="favoriteFirst" th:selected="${sort == 'favoriteFirst'}">Favorites First</option>
                    <option value="favoritesOnly" th:selected="${sort == 'favoritesOnly'}">Favorites Only</option>
                </select>
            </form>
        </div>

        <div class="container-fluid" th:if="${locationWeatherMap}">
            <div class="row justify-content-center">
                <div class="card weather-card m-2" th:each="item : ${locationWeatherMap}">
                    <div class="card-body d-flex flex-column">
                        <div class="container">
                            <div class="row">
                                <div class="col-10">
                                    <h4 class="card-title" th:text="${item.key.name}">Location</h4>
                                    <h6 class="text-muted card-subtitle mb-3"
                                        th:text="${#dates.format(item.value.date, 'HH:mm:ss')}">
                                        Time
                                    </h6>
                                </div>
                                <div class="col-2 d-flex align-items-center justify-content-end gap-2">
                                    <form th:action="@{/locations/{id}/favorite(id=${item.key.id})}"
                                          th:method="post" th:if="${item.key.favorite == null or !item.key.favorite}">
                                        <input type="hidden" name="sort" th:value="${sort}">
                                        <input type="hidden" name="page" th:value="${currentPage}">
                                        <button type="submit" class="btn btn-link p-0 fs-2">
                                            <i class="bi bi-star text-warning"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/locations/{id}/favorite(id=${item.key.id})}"
                                          th:method="delete" th:if="${item.key.favorite}">
                                        <input type="hidden" name="sort" th:value="${sort}">
                                        <input type="hidden" name="page" th:value="${currentPage}">
                                        <button type="submit" class="btn btn-link p-0 fs-2">
                                            <i class="bi bi-star-fill text-warning"></i>
                                        </button>
                                    </form>

                                    <div class="dropdown">
                                        <button aria-expanded="false" class="btn fs-4" data-bs-toggle="dropdown"
                                                style="opacity: 1;" type="button">
                                            <svg class="bi bi-three-dots-vertical" fill="currentColor"
                                                 height="1em" width="1em" viewBox="0 0 16 16"
                                                 xmlns="http://www.w3.org/2000/svg">
                                                <path d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0
                                                 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0
                                                 1.5 1.5 0 0 1 3 0z">
                                                </path>
                                            </svg>
                                        </button>
                                        <div class="dropdown-menu">
                                            <form th:action="@{/locations/{id}(id=${item.key.id})}" th:method="delete">
                                                <input type="hidden" name="sort" th:value="${sort}">
                                                <input type="hidden" name="page" th:value="${currentPage}">
                                                <button class="dropdown-item" type="submit">Delete</button>
                                            </form>
                                            <form th:action="@{/locations/{id}/favorite(id=${item.key.id})}"
                                                  th:method="post" th:if="${item.key.favorite == null or !item.key.favorite}">
                                                <input type="hidden" name="sort" th:value="${sort}">
                                                <input type="hidden" name="page" th:value="${currentPage}">
                                                <button class="dropdown-item" type="submit">Add to Favorites</button>
                                            </form>
                                            <form th:action="@{/locations/{id}/favorite(id=${item.key.id})}"
                                                  th:method="delete" th:if="${item.key.favorite}">
                                                <input type="hidden" name="sort" th:value="${sort}">
                                                <input type="hidden" name="page" th:value="${currentPage}">
                                                <button class="dropdown-item" type="submit">Remove from Favorites</button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="container">
                            <div class="row mb-2">
                                <div class="col-md-6 text-start align-self-center">
                                    <img alt="weather-image" class="card-img-top"
                                         th:src="@{'/images/' + ${item.value.weatherCondition} + '-' + ${item.value.timeOfDay} + '.svg'}">
                                </div>
                                <div class="col-md-6 text-end align-self-center">
                                    <h1 class="text-primary" th:text="${item.value.temperature} + ${temperatureSymbol}"></h1>
                                    <p th:text="'Feels like ' + ${item.value.temperatureFeelsLike} + ${temperatureSymbol}"></p>
                                </div>
                            </div>
                        </div>

                        <p class="fs-5 fw-semibold mt-auto" th:text="${#strings.capitalize(item.value.description)}"></p>

                        <div class="container mb-3">
                            <div class="row">
                                <!-- Left Column -->
                                <div class="col-md-6">
                                    <ul class="list-group">
                                        <li class="list-group-item">
                                            <i class="fas fa-temperature-low" style="margin-right: 4px;width: 20px;"></i>
                                            <span th:text="'Min ' + ${item.value.temperatureMinimum} + ${temperatureSymbol}"></span>
                                        </li>
                                        <li class="list-group-item">
                                            <i class="fas fa-cloud" style="margin-right: 4px;width: 20px;font-size: 14px;"></i>
                                            <span th:text="'Clouds ' + ${item.value.cloudiness} + '%'"></span>
                                        </li>
                                        <li class="list-group-item">
                                            <i class="fas fa-wind" style="margin-right: 5px;width: 20px;"></i>
                                            <span th:text="|${item.value.windDirection}&deg; ${item.value.windSpeed} ${windSpeedUnit}|"></span>
                                        </li>
                                        <li class="list-group-item">
                                            <svg class="bi bi-sunrise" fill="currentColor" height="1em"
                                                 style="margin-right: 7px;width: 20px;margin-left: -2px;"
                                                 viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M7.646 1.146a.5.5 0 0 1 .708 0l1.5 1.5a.5.5 0 0 1-.708.708L8.5
                                                 2.707V4.5a.5.5 0 0 1-1 0V2.707l-.646.647a.5.5 0
                                                 1 1-.708-.708l1.5-1.5zM2.343 4.343a.5.5 0 0
                                                 1 .707 0l1.414 1.414a.5.5 0 0 1-.707.707L2.343
                                                 5.05a.5.5 0 0 1 0-.707zm11.314 0a.5.5 0 0
                                                 1 0 .707l-1.414 1.414a.5.5 0 1 1-.707-.707l1.414-1.414a.5.5
                                                 0 0 1 .707 0zM8 7a3 3 0 0 1 2.599
                                                 4.5H5.4A3 3 0 0 1 8 7zm3.71 4.5a4 4
                                                 0 1 0-7.418 0H.499a.5.5 0 0 0 0
                                                 1h15a.5.5 0 0 0 0-1h-3.79z">
                                                </path>
                                            </svg>
                                            <span th:text="'Sunrise ' + ${#dates.format(item.value.sunrise, 'HH:mm:ss')}"></span>
                                        </li>
                                    </ul>
                                </div>

                                <div class="col-md-6">
                                    <ul class="list-group">
                                        <li class="list-group-item">
                                            <i class="fas fa-temperature-high" style="margin-right: 0;width: 20px;"></i>
                                            <span th:text="'Max ' + ${item.value.temperatureMaximum} + ${temperatureSymbol}"></span>
                                        </li>
                                        <li class="list-group-item">
                                            <i class="icon ion-waterdrop" style="margin-right: 10px;width: 20px;font-size: 16px;"></i>
                                            <span th:text="'Humidity ' + ${item.value.humidity} + '%'"></span>
                                        </li>
                                        <li class="list-group-item">
                                            <i class="fas fa-angle-double-down" style="margin-right: 0;width: 20px;"></i>
                                            <span th:text="'Pressure ' + ${item.value.pressure} + ' hPa'"></span>
                                        </li>
                                        <li class="list-group-item">
                                            <svg class="bi bi-sunset" fill="currentColor" height="1em"
                                                 style="margin-right: 5px;width: 20px;margin-left: -5px;"
                                                 viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M7.646 4.854a.5.5 0 0 0 .708
                                                 0l1.5-1.5a.5.5 0 0 0-.708-.708l-.646.647V1.5a.5.5
                                                 0 0 0-1 0v1.793l-.646-.647a.5.5 0 1
                                                 0-.708.708l1.5 1.5zm-5.303-.51a.5.5 0 0 1
                                                 .707 0l1.414 1.413a.5.5 0 0 1-.707.707L2.343
                                                 5.05a.5.5 0 0 1 0-.707zm11.314 0a.5.5
                                                 0 0 1 0 .706l-1.414 1.414a.5.5 0 1
                                                 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707
                                                 0zM8 7a3 3 0 0 1 2.599 4.5H5.4A3 3
                                                 0 0 1 8 7zm3.71 4.5a4 4 0 1 0-7.418
                                                 0H.499a.5.5 0 0 0 0 1h15a.5.5
                                                 0 0 0 0-1h-3.79z">
                                                </path>
                                            </svg>
                                            <span th:text="'Sunset ' + ${#dates.format(item.value.sunset, 'HH:mm:ss')}"></span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-center mt-3">
                            <a class="btn btn-primary btn-lg px-4" role="button"
                               th:href="@{/forecast(lat=${item.key.latitude},lon=${item.key.longitude})}">
                                Forecast
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="container d-flex justify-content-between align-items-center flex-column"
             th:unless="${locationWeatherMap}">
            <img alt="missing data" th:src="@{/images/missing-data.svg}">
            <p class="fw-bold">Location Required for Weather Information</p>
            <p>Please add a location to view weather. You can do it by using the search bar above.</p>
        </div>

        <nav aria-label="Dashboard pagination" class="d-flex justify-content-center mt-4"
             th:if="${totalPages != null and totalPages > 1}">
            <ul class="pagination">
                <li class="page-item" th:classappend="${!hasPreviousPage} ? 'disabled'">
                    <a class="page-link" th:href="@{/(sort=${sort}, page=${currentPage - 1})}">Previous</a>
                </li>
                <li class="page-item" th:each="pageNumber : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${pageNumber == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/(sort=${sort}, page=${pageNumber})}"
                       th:text="${pageNumber + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${!hasNextPage} ? 'disabled'">
                    <a class="page-link" th:href="@{/(sort=${sort}, page=${currentPage + 1})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>
    <div th:replace="~{footer-component}"></div>
</th:block>

<th:block th:fragment="extraScripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script th:src="@{/js/theme-toggle.js}"></script>
    <script th:src="@{/js/alerts.js}"></script>
</th:block>

</html>
