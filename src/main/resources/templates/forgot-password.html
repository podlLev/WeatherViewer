<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: commonHead('Weather Viewer - Forgot Password')}"></head>

<th:block th:fragment="headContent">
    <link rel="stylesheet" th:href="@{/css/authentication.css}">
    <link rel="stylesheet" th:href="@{/css/alerts.css}">
</th:block>

<th:block th:fragment="bodyContent">
    <div th:replace="~{fragments/alerts :: alertToasts(${successMessage}, ${errorMessage}, ${errorMessages})}"></div>
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-center align-items-center vh-100">
            <div class="bg-image"></div>
            <div class="form mx-auto row p-4">
                <h3 class="my-4 text-center">Forgot password</h3>
                <p class="text-center text-muted mb-4">Enter the email address on your account and we'll send you a link to reset your password.</p>

                <form method="post" th:action="@{/forgot-password}" th:object="${forgotPasswordDto}">
                    <div class="form-floating mb-4">
                        <input type="email" class="form-control" th:field="*{email}" id="email" placeholder="name@example.com" required>
                        <label for="email">Email</label>
                        <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1" th:errors="*{email}"></div>
                    </div>
                    <div>
                        <button class="btn btn-lg btn-primary mb-4 w-100" type="submit">Send reset link</button>
                        <div class="text-center">
                            <p><a th:href="@{/sign-in}">Back to sign in</a></p>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="extraScripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    <script th:src="@{/js/alerts.js}"></script>
</th:block>

</html>
