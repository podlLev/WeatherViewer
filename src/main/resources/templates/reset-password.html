<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: commonHead('Weather Viewer - Reset Password')}"></head>

<th:block th:fragment="headContent">
    <link rel="stylesheet" th:href="@{/css/authentication.css}">
    <link rel="stylesheet" th:href="@{/css/alerts.css}">
</th:block>

<th:block th:fragment="bodyContent">
    <div th:replace="~{fragments/alerts :: alertToasts(${successMessage}, ${errorMessage}, ${errorMessages})}"></div>
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-center align-items-center vh-100">
            <div class="bg-image"></div>
            <div class="form mx-auto row p-4">
                <h3 class="my-4 text-center">Reset password</h3>

                <form method="post" th:action="@{/reset-password}" th:object="${resetPasswordDto}">
                    <input type="hidden" th:field="*{token}">
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" th:field="*{password}" id="password" placeholder="New password" required>
                        <label for="password">New password</label>
                        <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1" th:errors="*{password}"></div>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" th:field="*{repeatPassword}" id="repeat-password" placeholder="Repeat new password" required>
                        <label for="repeat-password">Repeat new password</label>
                        <div th:if="${#fields.hasErrors('repeatPassword')}" class="text-danger small mt-1" th:errors="*{repeatPassword}"></div>
                    </div>
                    <div>
                        <button class="btn btn-lg btn-primary mb-4 w-100" type="submit">Set new password</button>
                        <div class="text-center">
                            <p><a th:href="@{/sign-in}">Back to sign in</a></p>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="extraScripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    <script th:src="@{/js/alerts.js}"></script>
</th:block>

</html>
