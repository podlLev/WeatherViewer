<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: commonHead('Weather Viewer - Profile')}"></head>

<th:block th:fragment="headContent">
    <link href="https://use.fontawesome.com/releases/v5.12.0/css/all.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/ionicons/2.0.1/css/ionicons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/alerts.css}">
</th:block>

<th:block th:fragment="bodyContent">
    <div th:replace="~{header-component}"></div>
    <div class="container min-vh-100">
        <form th:action="@{/profile}" th:object="${user}" method="post" class="row g-4">

            <div class="col-12 col-lg-7">
                <form th:action="@{/profile}" th:object="${user}" method="post" class="col-12 col-lg-7">
                    <div class="card shadow-sm rounded p-4 mb-5">
                        <h4 class="card-title mb-4">Account Settings</h4>

                        <div class="form-floating mb-3">
                            <input id="email" type="email" th:field="*{email}" class="form-control" placeholder="name@example.com" required>
                            <label for="email"><i class="bi bi-envelope-fill me-1"></i>Email</label>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="form-floating mb-3">
                            <input id="firstName" type="text" th:field="*{firstName}" class="form-control" placeholder="First Name" required>
                            <label for="firstName"><i class="bi bi-person-fill me-1"></i>First Name</label>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                        </div>

                        <div class="form-floating mb-3">
                            <input id="lastName" type="text" th:field="*{lastName}" class="form-control" placeholder="Last Name" required>
                            <label for="lastName"><i class="bi bi-person-fill me-1"></i>Last Name</label>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                        </div>

                        <div class="form-floating mb-4">
                            <input id="password" type="password" th:field="*{password}" class="form-control" placeholder="New Password">
                            <label for="password"><i class="bi bi-lock-fill me-1"></i>Password</label>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <div class="form-floating mb-4">
                            <select id="units" th:field="*{units}" class="form-select">
                                <option value="METRIC">Metric (°C, m/s)</option>
                                <option value="IMPERIAL">Imperial (°F, mph)</option>
                            </select>
                            <label for="units"><i class="bi bi-thermometer-half me-1"></i>Units</label>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold">Save Changes</button>
                        </div>
                    </div>
                </form>
            </div>
        </form>
    </div>
    <div th:replace="~{footer-component}"></div>
</th:block>

<th:block th:fragment="extraScripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    <script th:src="@{/js/alerts.js}"></script>
</th:block>

</html>
