<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: commonHead('Weather Viewer - Sign Up')}"></head>

<th:block th:fragment="headContent">
    <link rel="stylesheet" th:href="@{/css/authentication.css}">
</th:block>

<th:block th:fragment="bodyContent">
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-center align-items-center vh-100">
            <div class="bg-image"></div>
            <div class="form mx-auto row p-4">
                <h3 class="my-4 text-center">Sign up</h3>

                <form method="post" th:action="@{/sign-up}" th:object="${user}">
                    <input type="hidden" name="redirect" th:value="${redirect}" />
                    <div class="form-floating mb-4">
                        <input type="text" class="form-control" th:field="*{firstName}" id="first-name" name="first-name" placeholder="John" required>
                        <label for="first-name">First name</label>
                        <div th:if="${#fields.hasErrors('firstName')}" class="text-danger small mt-1" th:errors="*{firstName}"></div>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="text" class="form-control" th:field="*{lastName}" id="last-name" name="last-name" placeholder="Doe" required>
                        <label for="last-name">Last name</label>
                        <div th:if="${#fields.hasErrors('lastName')}" class="text-danger small mt-1" th:errors="*{lastName}"></div>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="text" class="form-control" th:field="*{email}" id="email" name="email" placeholder="name@example.com" required>
                        <label for="email">Email</label>
                        <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1" th:errors="*{email}"></div>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" th:field="*{password}" id="password" name="password" placeholder="Password" required>
                        <label for="password">Password</label>
                        <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1" th:errors="*{password}"></div>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control"  th:field="*{repeatPassword}" id="repeat-password" name="repeat-password" placeholder="Repeat password" required>
                        <label for="repeat-password">Repeat password</label>
                        <div th:if="${#fields.hasErrors('repeatPassword')}" class="text-danger small mt-1" th:errors="*{repeatPassword}"></div>
                    </div>
                    <div>
                        <button class="btn btn-lg btn-primary mb-4 w-100" type="submit">Sign up</button>
                        <div class="text-center">
                            <p>Already have an account - <a href="sign-in" th:href="@{/sign-in}">Sign in</a></p>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="extraScripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
</th:block>

</html>
