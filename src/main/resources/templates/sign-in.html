<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: commonHead('Weather Viewer - Sign In')}"></head>

<th:block th:fragment="headContent">
    <link rel="stylesheet" th:href="@{/css/authentication.css}">
    <link rel="stylesheet" th:href="@{/css/alerts.css}">
</th:block>

<th:block th:fragment="bodyContent">
    <div th:replace="~{fragments/alerts :: alertToasts(${successMessage}, ${errorMessage}, ${errorMessages})}"></div>
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-center align-items-center vh-100">
            <div class="bg-image"></div>
            <div class="form mx-auto row p-4">
                <h3 class="my-4 text-center">Sign in</h3>

                <form method="post" th:action="@{/sign-in}">
                    <input type="hidden" name="redirect" th:value="${redirect}">
                    <div class="form-floating mb-4">
                        <input type="text" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                        <label for="email">Email</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                        <label for="password">Password</label>
                    </div>
                    <div>
                        <button class="btn btn-lg btn-primary mb-4 w-100" type="submit">Sign in</button>
                        <div class="text-center">
                            <p>Don't have an account yet -
                                <a th:if="${redirect != null}" th:href="@{/sign-up(redirect=${redirect})}">Sign up</a>
                                <a th:unless="${redirect != null}" th:href="@{/sign-up}">Sign up</a>
                            </p>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="extraScripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    <script th:src="@{/js/alerts.js}"></script>
</th:block>

</html>
