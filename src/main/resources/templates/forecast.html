<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: commonHead('Weather Viewer - Forecast')}"></head>

<th:block th:fragment="headContent">
    <link href="https://use.fontawesome.com/releases/v5.12.0/css/all.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/ionicons/2.0.1/css/ionicons.min.css" rel="stylesheet">
</th:block>

<th:block th:fragment="bodyContent">
    <div th:replace="~{header-component}"></div>
    <div class="container min-vh-100">

        <section class="mb-5">
            <h2 class="mb-3">Hourly Forecast</h2>
            <p class="text-muted mb-4" th:text="${locationName}"></p>
            <div class="row row-cols-1 row-cols-sm-3 row-cols-md-5 g-3">
                <div class="col" th:each="forecast, iterStat : ${hourlyForecast}" th:if="${iterStat.index} < 5">
                    <div class="card h-100 text-center shadow-sm">
                        <div class="card-body d-flex flex-column justify-content-between">
                            <h5 class="card-title mb-2" th:text="${#dates.format(forecast.date, 'HH:mm')}"></h5>
                            <h3 class="text-primary mb-2" th:text="${#numbers.formatDecimal(forecast.temperature, 1, 2)} + ${temperatureSymbol}"></h3>
                            <img class="mb-2 mx-auto" th:src="@{'/images/' + ${forecast.weatherCondition} + '-' + ${forecast.timeOfDay} + '.svg'}" style="width:150px;" th:alt="|${forecast.weatherCondition} + ' ' + ${forecast.timeOfDay}|">
                            <p class="card-text text-muted mb-0" th:text="${#strings.capitalize(forecast.description)}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h2 class="mb-3">Daily Forecast</h2>
            <p class="text-muted mb-4" th:text="${locationName}"></p>
            <div class="row row-cols-1 row-cols-sm-3 row-cols-md-6 g-3">
                <div class="col" th:each="forecast : ${dailyForecast}">
                    <div class="card h-100 text-center shadow-sm">
                        <div class="card-body d-flex flex-column justify-content-between">
                            <h5 class="card-title mb-2">
                                <span th:text="${#dates.format(forecast.date, 'dd MMMM')}"></span><br>
                                <small th:text="${#dates.format(forecast.date, 'EEEE')}"></small>
                            </h5>
                            <h3 class="text-primary mb-1" th:text="${#numbers.formatDecimal(forecast.temperature, 1, 2)} + ${temperatureSymbol}"></h3>
                            <p class="text-secondary mb-2" th:text="${#numbers.formatDecimal(forecast.temperatureMinimum, 1, 2)} + ${temperatureSymbol}"></p>
                            <img class="mb-2 mx-auto" th:src="@{'/images/' + ${forecast.weatherCondition} + '-' + ${forecast.timeOfDay} + '.svg'}" style="width:150px;" th:alt="|${forecast.weatherCondition} + ' ' + ${forecast.timeOfDay}|">
                            <p class="card-text text-muted mb-0" th:text="${#strings.capitalize(#strings.toLowerCase(forecast.weatherCondition))}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </div>
    <div th:replace="~{footer-component}"></div>
</th:block>

<th:block th:fragment="extraScripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
</th:block>

</html>
