spring.application.name=WeatherViewer

# --- Database ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

spring.jpa.open-in-view=false
spring.mvc.hiddenmethod.filter.enabled=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# --- Remember-me ---
security.remember-me.key=${REMEMBER_ME_KEY}
security.remember-me.token-validity-seconds=1209600

# --- Account lockout (protects a single account against distributed brute force) ---
security.account-lockout.max-attempts=${ACCOUNT_LOCKOUT_MAX_ATTEMPTS:5}
security.account-lockout.lock-duration-minutes=${ACCOUNT_LOCKOUT_DURATION_MINUTES:15}

spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# --- Liquibase ---
spring.liquibase.change-log=classpath:liquibase/changelog.xml
spring.liquibase.enabled=true

# --- API docs ---
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.disable-swagger-default-url=true

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.paths-to-match=/api/v1/**

scalar.enabled=true
scalar.theme=purple
scalar.path=/scalar

# --- Locations ---
location.max-per-user=${LOCATION_MAX_PER_USER:100}
location.dashboard.page-size=${LOCATION_DASHBOARD_PAGE_SIZE:4}

# --- Weather API (OpenWeatherMap) ---
weather.dashboard.fetch-pool-size=${WEATHER_DASHBOARD_FETCH_POOL_SIZE:20}
weather.dashboard.fetch-timeout-ms=${WEATHER_DASHBOARD_FETCH_TIMEOUT_MS:4000}
weather.base.api.url=https://api.openweathermap.org
weather.api.url.suffix=/data/2.5/weather
forecast.api.url.suffix=/data/2.5/forecast
geo.api.url.suffix=/geo/1.0/direct
weather.api.key=${WEATHER_API_KEY}
weather.api.connect-timeout-ms=${WEATHER_API_CONNECT_TIMEOUT_MS:3000}
weather.api.read-timeout-ms=${WEATHER_API_READ_TIMEOUT_MS:5000}

# --- Resilience (retry + circuit breaker around the OpenWeatherMap client) ---
resilience4j.retry.instances.weatherApi.max-attempts=3
resilience4j.retry.instances.weatherApi.wait-duration=500ms
resilience4j.retry.instances.weatherApi.enable-exponential-backoff=true
resilience4j.retry.instances.weatherApi.exponential-backoff-multiplier=2
resilience4j.retry.instances.weatherApi.retry-exception-predicate=com.weatherviewer.service.integration.WeatherApiRetryPredicate

resilience4j.circuitbreaker.instances.weatherApi.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.weatherApi.sliding-window-size=20
resilience4j.circuitbreaker.instances.weatherApi.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.weatherApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.weatherApi.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.weatherApi.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.weatherApi.automatic-transition-from-open-to-half-open-enabled=true

# --- Redis / caching ---
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.cache.redis.time-to-live=3600000

# --- Mail (verification / password reset) ---
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:no-reply@weatherviewer.local}

# --- Links embedded in emailed verification / reset tokens ---
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.verification.token-ttl-hours=24
app.password-reset.token-ttl-hours=1

# --- Actuator / health / metrics ---
management.server.port=${MANAGEMENT_SERVER_PORT:8081}
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,500ms,1s,2s

# --- Graceful shutdown ---
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# --- Rate limiting ---
rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.trusted-proxies=${TRUSTED_PROXIES:}
rate-limit.default-limit=100
rate-limit.default-window-seconds=60

rate-limit.rules[0].path-prefix=/sign-in
rate-limit.rules[0].limit=5
rate-limit.rules[0].window-seconds=60

rate-limit.rules[1].path-prefix=/sign-up
rate-limit.rules[1].limit=5
rate-limit.rules[1].window-seconds=60

rate-limit.rules[2].path-prefix=/api/v1/weather
rate-limit.rules[2].limit=30
rate-limit.rules[2].window-seconds=60

rate-limit.rules[3].path-prefix=/api/v1/locations
rate-limit.rules[3].limit=60
rate-limit.rules[3].window-seconds=60

rate-limit.rules[4].path-prefix=/api/v1/users
rate-limit.rules[4].limit=60
rate-limit.rules[4].window-seconds=60

management.tracing.sampling.probability=1.0
logging.pattern.correlation=[${spring.application.name:-},%X{traceId:-},%X{spanId:-}]