services:
  postgres:
    image: postgres:17
    container_name: weather_viewer_db_dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=UTC
      - PGTZ=UTC
    command: [ "-c", "timezone=UTC" ]
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d weather" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: weather_viewer_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
  redis_data_dev:
